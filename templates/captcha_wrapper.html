<!DOCTYPE html>
<html lang="ru">

<head>
    <title>Captcha</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #eee;
            gap: 16px;
        }

        h2 {
            color: #ff4444;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        iframe {
            border: 2px solid #444;
            display: block;
            max-width: 100%;
        }

        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 20px;
            padding: 24px;
            text-align: center;
        }

        #intro h2 {
            font-size: 1.5rem;
        }

        #intro-desc {
            font-size: 1.1rem;
            color: #ccc;
            max-width: 420px;
            line-height: 1.5;
        }

        #btn-start {
            margin-top: 8px;
            padding: 12px 32px;
            background: #1a1a1a;
            border: 2px solid #33ff33;
            color: #33ff33;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.15s, color 0.15s;
        }

        #btn-start:hover {
            background: #33ff33;
            color: #111;
        }

        #result {
            display: none;
            text-align: center;
            padding: 24px 32px;
            background: #1a1a1a;
            border: 2px solid #33aa33;
            border-radius: 4px;
        }

        #result p {
            margin-bottom: 10px;
            font-size: 1rem;
            color: #ccc;
        }

        #code-box {
            background: #000;
            border: 2px solid #33ff33;
            padding: 12px 24px;
            font-size: 2.4rem;
            font-weight: bold;
            letter-spacing: 8px;
            color: #33ff33;
            margin: 12px 0;
            font-family: 'Courier New', monospace;
        }

        #hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div id="intro">
        <h2>CAPTCHA</h2>
        <p id="intro-desc">__CAPTCHA_DESC__</p>
        <button id="btn-start">Пройти капчу</button>
    </div>
    <h2>CAPTCHA</h2>
    <iframe id="frame" src="" width="__IFRAME_WIDTH__" height="__IFRAME_HEIGHT__" style="__IFRAME_STYLE__"
        scrolling="auto" frameborder="0"></iframe>
    <div id="result">
        <p>&#x2705; Капча пройдена!</p>
        <p>Отправьте этот код боту:</p>
        <div id="code-box"></div>
        <div id="hint">Введите код в чате с ботом для завершения верификации</div>
    </div>
    <script>
        var uuid = '__UUID__';
        var challenge = '__CHALLENGE__';
        var iframeSrc = '__IFRAME_SRC__';
        var done = false;

        document.getElementById('btn-start').addEventListener('click', function () {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('frame').src = iframeSrc;
        });

        window.addEventListener('message', function (e) {
            if (done) return;
            if (e.origin !== window.location.origin) return;
            if (!e.data) return;

            // Tetris: iframe called /complete itself and put the code in the message
            if (e.data.type === 'doom_complete' && e.data.code) {
                done = true;
                document.getElementById('frame').style.display = 'none';
                document.getElementById('code-box').textContent = e.data.code;
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            // Doom (type=doom_complete, no code) or Mario (event=levelComplete)
            var isDoom = (e.data.type === 'doom_complete');
            var isMario = (e.data.event === 'levelComplete');
            if (!isDoom && !isMario) return;
            done = true;

            fetch('/api/captcha/' + uuid + '/complete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({challenge: challenge})
            })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.code) {
                        document.getElementById('frame').style.display = 'none';
                        document.getElementById('code-box').textContent = data.code;
                        document.getElementById('result').style.display = 'block';
                        document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
        });
    </script>
</body>

</html>
